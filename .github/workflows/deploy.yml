name: Deploy website

# main push  -> staging
# tag push   -> production
on:
  push:
    branches:
      - main
    tags:
      - '**'

# One run per environment at a time. Staging (main push) cancels any earlier
# in-flight run so only the newest commit builds/deploys. Production (tag push)
# never cancels — extra runs queue and apply in order, so no release is dropped.
concurrency:
  group: deploy-${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}
      url: ${{ vars.DEPLOY_URL }}

    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - uses: actions/checkout@v6

      - name: Check required config
        run: |
          if [ -z "$DEPLOY_PATH" ]; then
            echo "::error::DEPLOY_PATH secret is not set for the '${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'staging' }}' environment. Configure it under Settings > Environments."
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync files to server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "data" \
            --exclude "docker-compose.override.yml" \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:"$DEPLOY_PATH"/

      - name: Rebuild and restart Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd $DEPLOY_PATH && docker compose up -d --build --force-recreate && docker system prune -af"
