services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aliasvault-landing
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./src/content:/app/src/content
      # Payload CMS persistent data: SQLite DB + uploaded media live together in
      # ONE host dir (./data) so the whole "set" is trivial to copy between prod
      # and dev for testing. These are bind mounts (host filesystem), not named
      # Docker volumes. On the host: ./data/payload.db (+ -wal/-shm) and
      # ./data/uploads/ — to migrate, populate ./data on dev and copy it here.
      - ./data:/app/data                    # payload.db (+ -wal/-shm sidecars)
      - ./data/uploads:/app/public/uploads  # media, served statically at /uploads/<file>
    # Load runtime env (STATUS_API_URL, NEXT_PUBLIC_STATUS_URL, …) from .env.
    # Optional so the stack still starts when no .env is present.
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://www.aliasvault.com
      # Point Payload at the bind-mounted DB inside ./data (see volumes above).
      - DATABASE_URI=file:/app/data/payload.db
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    mem_limit: 512m
